server:
  port: 8081

spring:
  application:
    name: agent-java

# AI 模型配置
ai:
  openai:
    api-key: 
    base-url: https://api-inference.modelscope.cn
    model: Qwen/Qwen3.5-35B-A3B
    temperature: 0.7

# 记忆系统配置
memory:
  enabled: true
  default-decay-factor: 0.9
  max-memories-per-user: 100
  memory-expire-days: 30
  recent-searches-limit: 10

# Ollama 向量化配置
ollama:
  embedding:
    base-url: http://localhost:11434
    model-name: qwen3-embedding:0.6b
    dimensions: 1024

# 语义缓存配置
semantic:
  cache:
    enabled: true
    similarity-threshold: 0.85
    max-size: 1000
    expire-hours: 24

logging:
  level:
    com.agent.java: DEBUG
    io.agentscope: DEBUG
    okhttp3: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/agent.log
    max-size: 10MB
    max-history: 1
