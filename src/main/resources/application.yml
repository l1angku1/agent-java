spring:
  application:
    name: agent-java

ai:
  openai:
    api-key: 
    base-url: https://api-inference.modelscope.cn
    model: ZhipuAI/GLM-5
    temperature: 0.7
  memory:
    enabled: true
    default-decay-factor: 0.9
    max-memories-per-user: 100
    memory-expire-days: 30

server:
  port: 8081

# Ollama 向量化配置
ollama:
  embedding:
    base-url: http://localhost:11434
    model-name: qwen3-embedding:0.6b
    dimensions: 1024

logging:
  level:
    com.agent.java: DEBUG
    io.agentscope: TRACE
    io.agentscope.core: TRACE
    io.agentscope.core.model: TRACE
    io.agentscope.core.skill: TRACE
    io.agentscope.core.tool: TRACE
    okhttp3: DEBUG
    okhttp3.internal.http: DEBUG
    org.springframework.web.client: DEBUG
    org.springframework.ai: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/agent.log
    max-size: 10MB
    max-history: 7
